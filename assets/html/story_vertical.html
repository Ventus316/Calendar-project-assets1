<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>難哄・垂直故事線</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', 'Noto Serif TC', serif; 
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* 修正 1：移除黑色背景，改為透明，避免遮擋 */
            background: transparent;
        }

        /* 修正 2：背景層設定 */
        .background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            /* 修正 3：檔名改為 jpg */
            background-image: url("./heng.png"); 
            background-size: cover;
            background-position: center center; 
            background-repeat: no-repeat;
            
            /* 修正 4：Z-index 改為 0，確保不會被 body 蓋住，但仍在內容之下 */
            z-index: 0;
            
            /* 稍微降低一點點亮度讓文字更清楚，但不要太黑 */
            filter: brightness(0.85); 
        }

        /* 標題區域 */
        .header-info {
            position: fixed;
            top: 5vh; 
            left: 50%;   
            transform: translateX(-50%);
            text-align: center;
            z-index: 20; 
            color: #d4af37;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            pointer-events: none;
            transition: opacity 0.3s;
            width: 100%;
        }
        
        .header-info h1 { 
            font-size: clamp(18px, 4vw, 30px); 
            letter-spacing: 0.3em; 
            margin: 0;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* 垂直時間軸容器 */
        .timeline-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column; 
            align-items: center; 
            padding-top: 45vh; 
            padding-bottom: 45vh; 
            overflow-y: auto; 
            overflow-x: hidden;
            scrollbar-width: none; 
            -ms-overflow-style: none;
            /* 確保內容層級高於背景 */
            z-index: 10;
        }
        .timeline-wrapper::-webkit-scrollbar { display: none; }

        /* 卡片樣式 */
        .card-item {
            position: relative;
            flex: 0 0 auto;
            
            /* --- 修正 5：再次縮小寬度，讓卡片塞在兩個人中間 --- */
            width: 35vw;  /* 從 48vw 改為 35vw */
            min-width: 200px; /* 手機版最小寬度 */
            max-width: 260px; /* 電腦版最大限制 */
            
            aspect-ratio: 16 / 9;
            margin: 25px 0; /* 增加間距，讓畫面更乾淨 */
            
            background-color: rgba(43, 34, 34, 0.95);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: flex-start;   
            text-align: left;
            padding: 10px;
            
            cursor: pointer;
            z-index: 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            
            transform-origin: center center; 
            transition: border-color 0.3s, box-shadow 0.3s, opacity 0.3s; 
            will-change: transform;
            overflow: hidden;
        }

        .card-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.1) 60%, rgba(0,0,0,0) 100%);
            z-index: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
            width: 100%;
        }

        .card-item.locked {
            background-image: none !important;
            background-color: rgba(20, 20, 20, 0.85);
            border-color: #444;
            color: #555;
            cursor: not-allowed;
            justify-content: center;
            align-items: center;
        }

        .card-date {
            font-size: 1.5rem; /* 字體再調小一點 */
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 2px;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
            line-height: 1;
        }
        
        .card-title {
            font-size: 0.8rem;
            color: #fff;
            opacity: 0.9; 
            text-shadow: 0 2px 5px rgba(0,0,0,1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .card-item.active-card {
            border: 2px solid #d4af37;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.8);
        }

        .card-lock-icon { font-size: 1.5rem; opacity: 0.4; margin-bottom: 5px; z-index: 2;}

        /* 全螢幕轉場 */
        #video-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: black; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease-in-out;
        }
        #video-overlay.active { opacity: 1; pointer-events: all; }
        #transition-video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%; width: auto; height: auto;
            transform: translate(-50%, -50%); object-fit: cover; display: none;
        }
        
        /* 詳細頁面 */
        #detail-view {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            max-width: 800px; 
            aspect-ratio: 16 / 9; 
            background: rgba(20, 20, 20, 0.98); 
            border: 1px solid rgba(212, 175, 55, 0.6);
            border-radius: 8px; 
            box-shadow: 0 0 50px rgba(0,0,0,1);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            z-index: 150;
            overflow: hidden;
            cursor: pointer;
        }
        #detail-view.active { opacity: 1; visibility: visible; }

        .detail-scaler {
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px; 
            text-align: center;
        }

        .detail-date {
            font-size: 3em; 
            color: #d4af37; 
            font-weight: bold;
            margin-bottom: 15px; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }
        .detail-title { 
            font-size: 1.5em; 
            margin-bottom: 20px; 
            color: #ffffff; 
            text-shadow: 0 2px 5px rgba(0,0,0,1); 
        }
        .detail-text {
            font-size: 1.3em; 
            line-height: 1.6;
            font-style: italic;
            color: #ffd700; 
            font-weight: bold; 
        }

        .reset-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.5); color: #555;
            border: 1px solid #333; padding: 5px 10px;
            border-radius: 4px; cursor: pointer; z-index: 200;
        }
        .reset-btn:hover { color: #d4af37; border-color: #d4af37; }

    </style>
</head>
<body>

    <div class="background"></div>

    <div class="header-info">
        <h1>DECEMBER</h1>
    </div>

    <div class="timeline-wrapper" id="timeline-scroll-area">
        </div>

    <div id="video-overlay">
        <video id="transition-video" muted playsinline>
            您的瀏覽器不支援 HTML5 影片。
        </video>
    </div>

    <div id="detail-view" onclick="closeDetail()">
        <div class="detail-scaler" id="detail-scaler">
            <div class="detail-date" id="display-date">12 / 01</div>
            <div class="detail-title" id="display-title">標題</div>
            <div class="detail-text" id="display-quote">內容</div>
        </div>
    </div>

    <button class="reset-btn" onclick="resetProgress()">↻</button>

    <script>
        const episodes = [
            { ep: "EP 01", title: "再見，桑延", quote: "再見，溫以凡", img: "Ep1.png" },
            { ep: "EP 02", title: "你的名字", quote: "刻在我心底" },
            { ep: "EP 03", title: "每個人都需要白月光", quote: "你就是我的白月光" },
            { ep: "EP 04", title: "流言", quote: "由我幫你吹散" },
            { ep: "EP 05", title: "靠近一點", quote: "可以嗎？" },
            { ep: "EP 06", title: "我會一直陪著你", quote: "你會一直陪著我？" },
            { ep: "EP 07", title: "偷偷……", quote: "藏不住" },
            { ep: "EP 08", title: "雨中的太陽", quote: "耀眼而溫暖" },
            { ep: "EP 09", title: "口是心非", quote: "但是身體會很誠實" },
            { ep: "EP 10", title: "你忘了", quote: "但我記得" },
            { ep: "EP 11", title: "保護好自己", quote: "我都在" },
            { ep: "EP 12", title: "如何才能快樂？", quote: "有你才快樂" },
            { ep: "EP 13", title: "約好了", quote: "想跟你一起" },
            { ep: "EP 14", title: "放不下", quote: "對你的感覺" },
            { ep: "EP 15", title: "痕跡", quote: "是愛刻出來的" },
            { ep: "EP 16", title: "生日快樂", quote: "得償所願" },
            { ep: "EP 17", title: "最遙遠的距離", quote: "是說不出口的愛你" },
            { ep: "EP 18", title: "在飛奔向你的途中", quote: "請在原地等我" },
            { ep: "EP 19", title: "敗降", quote: "不是敗將，而是敗給你溫霜降" },
            { ep: "EP 20", title: "想悄悄住進你的靈魂", quote: "接住你在每一個脆弱的時刻" },
            { ep: "EP 21", title: "希望在哪？", quote: "希望在未來每一個有你的地方" },
            { ep: "EP 22", title: "機會是留給你的", quote: "而我，已經準備好被你抓住了" },
            { ep: "EP 23", title: "躲能躲哪兒？", quote: "只能躲進我懷裡" },
            { ep: "EP 24", title: "離開的理由", quote: "是不願成為你人生的風暴" },
            { ep: "EP 25", title: "不管你在哪", quote: "我去找你" },
            { ep: "EP 26", title: "約定", quote: "我不會再失約了" },
            { ep: "EP 27", title: "我接受", quote: "不完美的自己" },
            { ep: "EP 28", title: "重生的機會", quote: "如果有，一定還是為了遇見你" },
            { ep: "EP 29", title: "愛是", quote: "成為彼此的光" },
            { ep: "EP 30", title: "依靠是", quote: "托付脆弱，堅定選擇" },
            { ep: "EP 31", title: "愛你", quote: "從相遇的第一天到未來每一天" },
            { ep: "EP 32", title: "至死都暴烈地愛我", quote: "是你！" }
        ];

        let unlockedIndex = parseInt(localStorage.getItem('loveCalendarProgress')) || 0;
        const wrapper = document.getElementById('timeline-scroll-area');
        const videoOverlay = document.getElementById('video-overlay');
        const transitionVideo = document.getElementById('transition-video');
        const detailView = document.getElementById('detail-view');
        const videoSourceURL = './trans.mp4';
        
        let currentViewingIndex = -1;
        let cardElements = [];
        let centerIndex = -1;
        
        let snapTargetIndex = -1; 
        let isSnapping = false;

        function initTimeline() {
            const existingItems = document.querySelectorAll('.card-item');
            existingItems.forEach(el => el.remove());
            cardElements = [];

            episodes.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = 'card-item';
                
                let displayDate = (index + 1).toString().padStart(2, '0');
                if (index === 31) displayDate = "01";

                if (index > unlockedIndex) {
                    card.classList.add('locked');
                    card.innerHTML = `
                        <div class="card-overlay"></div>
                        <div class="card-lock-icon">🔒</div>
                        <div class="card-date" style="opacity: 0.5;">${displayDate}</div>
                    `;
                } else {
                    if (data.img) {
                        card.style.backgroundImage = `url('${data.img}')`;
                    }
                    card.innerHTML = `
                        <div class="card-overlay"></div>
                        <div class="card-content">
                            <div class="card-date">${displayDate}</div>
                            <div class="card-title">${data.title}</div>
                        </div>
                    `;
                    card.onclick = () => handleCardClick(index);
                }

                card.id = `card-${index}`;
                wrapper.appendChild(card);
                cardElements.push(card);
            });

            updateCardScalesLogic();
            scrollToCard(unlockedIndex, 'auto');
            requestAnimationFrame(animationLoop);
        }

        function updateCardScalesLogic() {
            const viewportHeight = wrapper.clientHeight;
            const focusPoint = viewportHeight / 2;

            let closestDist = Infinity;
            let tempCenterIndex = -1;

            cardElements.forEach((card, index) => {
                const rect = card.getBoundingClientRect();
                const cardHeight = rect.height;
                const cardCenter = rect.top + cardHeight / 2;
                
                const distance = Math.abs(focusPoint - cardCenter);
                
                if (distance < closestDist) {
                    closestDist = distance;
                    tempCenterIndex = index;
                }
                
                const activeRange = cardHeight * 0.8; 
                
                let scale = 1;
                let opacity = 1;
                let zIndex = 1;

                if (distance < activeRange) {
                    scale = 1.05 - (distance / activeRange) * 0.05; 
                    card.classList.add('active-card');
                    zIndex = 10;
                    opacity = 1;
                } else {
                    const progress = (distance - activeRange) / (viewportHeight / 1.5);
                    scale = Math.max(0.85, 1.0 - progress * 0.3);
                    card.classList.remove('active-card');
                    zIndex = 5;
                    opacity = Math.max(0.4, 1 - progress * 1.5);
                }

                card.style.transform = `scale(${scale})`;
                card.style.opacity = opacity;
                card.style.zIndex = zIndex;
            });
            centerIndex = tempCenterIndex;
        }

        function animationLoop() {
            if (isSnapping && snapTargetIndex !== -1) {
                const targetCard = cardElements[snapTargetIndex];
                if (targetCard) {
                    const rect = targetCard.getBoundingClientRect();
                    const currentCenter = rect.top + rect.height / 2;
                    const focusPoint = wrapper.clientHeight / 2;
                    const diff = currentCenter - focusPoint;
                    
                    if (Math.abs(diff) > 1) {
                        wrapper.scrollTop += diff * 0.1;
                    } else {
                        isSnapping = false;
                    }
                }
            }
            updateCardScalesLogic();
            requestAnimationFrame(animationLoop);
        }

        function scrollToCard(index, behavior = 'smooth') {
            const card = document.getElementById(`card-${index}`);
            if (!card) return;
            updateCardScalesLogic();
            const wrapperHeight = wrapper.clientHeight;
            const cardTop = card.offsetTop;
            const cardHeight = card.clientHeight;
            const targetScrollTop = cardTop - (wrapperHeight / 2) + (cardHeight / 2);
            wrapper.scrollTo({ top: targetScrollTop, behavior: behavior });
        }

        function handleCardClick(index) {
            if (index === centerIndex) {
                openCard(index);
            } else {
                snapTargetIndex = index;
                isSnapping = true;
            }
        }

        wrapper.addEventListener("wheel", () => { isSnapping = false; snapTargetIndex = -1; });
        wrapper.addEventListener("touchstart", () => { isSnapping = false; snapTargetIndex = -1; });

        function openCard(index) {
            currentViewingIndex = index;
            const data = episodes[index];
            let displayDateStr = (index + 1).toString().padStart(2, '0');
            if (index === 31) displayDateStr = "01 / 01";
            else displayDateStr = `12 / ${displayDateStr}`;

            document.getElementById('display-date').innerText = displayDateStr;
            document.getElementById('display-title').innerText = data.title;
            document.getElementById('display-quote').innerHTML = data.quote;

            wrapper.style.opacity = '0'; 
            document.querySelector('.header-info').style.opacity = '0'; 
            playTransition();
        }

        function playTransition() {
            videoOverlay.classList.add('active');
            if (!transitionVideo.src || transitionVideo.src === window.location.href) {
                 transitionVideo.src = videoSourceURL;
            }
            transitionVideo.playbackRate = 3.2;
            transitionVideo.style.display = 'block';
            transitionVideo.currentTime = 0;
            transitionVideo.play().catch(e => console.log(e));

            setTimeout(() => {
                finishTransition();
            }, 2500); 
        }

        function finishTransition() {
            detailView.classList.add('active');
            videoOverlay.classList.remove('active');
            setTimeout(() => {
                transitionVideo.pause();
                transitionVideo.style.display = 'none';
            }, 500);
        }

        function closeDetail() {
            detailView.classList.remove('active');
            wrapper.style.opacity = '1'; 
            document.querySelector('.header-info').style.opacity = '1';

            if (currentViewingIndex === unlockedIndex && unlockedIndex < episodes.length - 1) {
                unlockedIndex++;
                localStorage.setItem('loveCalendarProgress', unlockedIndex);
                setTimeout(() => {
                    initTimeline(); 
                    scrollToCard(unlockedIndex, 'smooth');
                }, 600);
            }
        }

        function resetProgress() {
            if(confirm("重置回到起點？")) {
                localStorage.removeItem('loveCalendarProgress');
                unlockedIndex = 0;
                initTimeline();
            }
        }

        initTimeline();

    </script>
</body>
</html>
